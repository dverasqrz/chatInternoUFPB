services:
  db:
    image: postgres:16-alpine
    container_name: ufpb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ufpb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ufpb123}
      POSTGRES_DB: ${POSTGRES_DB:-ufpb_chat}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ufpb} -d ${POSTGRES_DB:-ufpb_chat}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        - VERSION=${VERSION:-2.0.0}
    container_name: ufpb_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://ufpb:ufpb123@db:5432/ufpb_chat}
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./runtime:/app/runtime
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; urllib.request.urlopen('http://localhost:8000/health') if sys.exit(0) else sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:

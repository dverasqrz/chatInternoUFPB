services:

  automacoes_sti_ufpb_whatsapp_fastapi:
    image: ufpb_app_image:latest
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        - VERSION=${VERSION:-2.0.0}
    container_name: automacoes_sti_ufpb_whatsapp_fastapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be configured in .env or environment}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./runtime:/app/runtime
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ufpb_chat_network

networks:
  ufpb_chat_network:
    driver: bridge
    external: false


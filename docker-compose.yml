services:
  db:
    image: postgres:16-alpine
    container_name: ufpb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ufpb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ufpb123}
      POSTGRES_DB: ${POSTGRES_DB:-ufpb_chat}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ufpb} -d ${POSTGRES_DB:-ufpb_chat}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: ufpb_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://ufpb:ufpb123@db:5432/ufpb_chat}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./runtime:/app/runtime

volumes:
  postgres_data:

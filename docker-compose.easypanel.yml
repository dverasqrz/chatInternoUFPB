version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ufpb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ufpb123}
      POSTGRES_DB: ${POSTGRES_DB:-ufpb_chat}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ufpb} -d ${POSTGRES_DB:-ufpb_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: dverazs/chatzapufpb:v1
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+psycopg2://ufpb:ufpb123@db:5432/ufpb_chat
      PYTHONPATH: /app

      # Application
      APP_NAME: UFPB Chat Multiatendente
      API_V1_PREFIX: /api/v1
      ENVIRONMENT: production
      DEBUG: false

      # Security
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave}
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200

      # Admin
      ADMIN_NAME: ${ADMIN_NAME:-Diego Veras}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-diego.veras@gmail.com}
      ADMIN_BOOTSTRAP_FILE: /app/runtime/admin_bootstrap.txt

      # Webhooks
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-}
      N8N_INBOUND_WEBHOOK_URL: ${N8N_INBOUND_WEBHOOK_URL:-}
      N8N_OUTBOUND_WEBHOOK_URL: ${N8N_OUTBOUND_WEBHOOK_URL:-}
      N8N_OUTBOUND_AUTH_TYPE: ${N8N_OUTBOUND_AUTH_TYPE:-header}
      N8N_OUTBOUND_AUTH_HEADER_NAME: ${N8N_OUTBOUND_AUTH_HEADER_NAME:-x-app-token}
      N8N_OUTBOUND_AUTH_HEADER_VALUE: ${N8N_OUTBOUND_AUTH_HEADER_VALUE:-}

      # AI
      AI_WEBHOOK_URL_TEST: ${AI_WEBHOOK_URL_TEST:-}
      AI_WEBHOOK_URL_PROD: ${AI_WEBHOOK_URL_PROD:-}
      AI_WEBHOOK_USERNAME: ${AI_WEBHOOK_USERNAME:-}
      AI_WEBHOOK_PASSWORD: ${AI_WEBHOOK_PASSWORD:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.sti.ufpb.br/}

      # CORS and Domain
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}

      # Media
      MEDIA_MAX_FILE_SIZE: 26214400  # 25MB
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - uploads_data:/app/uploads
      - runtime_data:/app/runtime
      - logs_data:/app/logs

volumes:
  postgres_data:
  uploads_data:
  runtime_data:
  logs_data:</content>

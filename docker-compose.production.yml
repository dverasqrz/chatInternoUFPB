version: '3.8'

services:
  app:
    build: .
    container_name: ufpb_app_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - N8N_INBOUND_WEBHOOK_URL=${N8N_INBOUND_WEBHOOK_URL}
      - WEBHOOK_TOKEN=${WEBHOOK_TOKEN}
      - N8N_OUTBOUND_WEBHOOK_URL=${N8N_OUTBOUND_WEBHOOK_URL}
      - N8N_OUTBOUND_AUTH_TYPE=${N8N_OUTBOUND_AUTH_TYPE}
      - N8N_OUTBOUND_AUTH_HEADER_NAME=${N8N_OUTBOUND_AUTH_HEADER_NAME}
      - N8N_OUTBOUND_AUTH_HEADER_VALUE=${N8N_OUTBOUND_AUTH_HEADER_VALUE}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
      - ENVIRONMENT=production
      - DEBUG=false
    volumes:
      - ./uploads:/app/uploads
      - ./runtime:/app/runtime
    depends_on:
      - db
    networks:
      - ufpb_network

  db:
    image: postgres:16-alpine
    container_name: ufpb_db_prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ufpb_chat}
      - POSTGRES_USER=${POSTGRES_USER:-ufpb}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ufpb_network

volumes:
  postgres_data:

networks:
  ufpb_network:
    driver: bridge
